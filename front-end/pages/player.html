<!-- pages/player.html -->
<div class="model-info" data-model="model1_player_clustering"></div>
<div class="two-col" style="align-items:start">

  <div>
    <div class="card mb-16">
      <div class="player-profile">
        <div class="player-avatar">--</div>
        <div class="player-info">
          <div class="player-name">Loading...</div>
          <div class="player-meta">— • —</div>
          <div class="player-stats-row"></div>
        </div>
      </div>
    </div>

    <div class="metrics-grid" style="grid-template-columns:repeat(3,1fr)">
      <!-- Populated by renderPlayer() -->
    </div>

    <div class="card mt-16">
      <div class="card-title">Player Style Clusters</div>
      <div class="cluster-grid" style="grid-template-columns:repeat(2,1fr)">
        <!-- Populated by renderPlayer() -->
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Performance Radar Chart</div>
    <div class="chart-wrap" style="height:340px">
      <canvas id="radarChart"></canvas>
    </div>
  </div>

</div>

<div class="card mt-16">
  <div class="card-title">Player Stats Table</div>
  <table class="data-table">
    <thead>
      <tr>
        <th>Player</th>
        <th>Position</th>
        <th>Type</th>
        <th>Matches</th>
        <th>xG/90</th>
        <th>xA/90</th>
        <th>Pass %</th>
        <th>Key Passes</th>
      </tr>
    </thead>
    <tbody>
      <!-- Populated by renderPlayer() -->
    </tbody>
  </table>
</div>
